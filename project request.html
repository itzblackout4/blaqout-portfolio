<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Initialize Project | Blaq.dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            overflow-x: hidden !important;
            position: relative;
            max-width: 100%;
        }
        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }
        @media screen and (max-width: 768px) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }
    </style>
</head>
<body class="antialiased selection:bg-cyan-500/30 selection:text-cyan-200 w-full overflow-x:hidden">

    <nav class="sticky top-0 z-50 bg-[#0f172a]/70 backdrop-blur-xl border-b border-slate-800/80 w-full">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="mono-font text-sm font-medium tracking-tight text-cyan-400">
                Gags_web<span class="text-white">developer portfolio;</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-xs uppercase tracking-wider font-medium text-slate-400 hover:text-white transition">Home</a>
                <a href="project.html" class="text-xs uppercase tracking-wider font-medium text-slate-400 hover:text-white transition">Projects</a>
            </div>
        </div>
    </nav>

    <section class="w-full max-w-3xl mx-auto px-4 py-12 md:py-20 overflow-hidden">
        <div class="bg-slate-900/40 rounded-2xl border border-slate-800/80 shadow-2xl p-6 md:p-12 box-border">
            <div class="text-center mb-8">
                <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight">System Initialization</h2>
                <p class="text-slate-400 mt-2 text-xs md:text-sm">Have a client platform or operational pipeline problem you need explicitly engineered? Launch a project ticket below.</p>
            </div>

            <form action="https://formspree.io/f/xgojwjnl" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mono-font text-[10px] uppercase tracking-wider text-slate-400 mb-2">client_identity *</label>
                        <input type="text" name="Client Name" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3.5 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition text-base md:text-sm">
                    </div>
                    <div>
                        <label class="block mono-font text-[10px] uppercase tracking-wider text-slate-400 mb-2">routing_email *</label>
                        <input type="email" name="_replyto" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3.5 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition text-base md:text-sm">
                    </div>
                </div>

                <div>
                    <label class="block mono-font text-[10px] uppercase tracking-wider text-slate-400 mb-2">project_payload_brief *</label>
                    <textarea name="Project Brief" rows="4" placeholder="Detail custom operations, feature integrations, or interface targets..." required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3.5 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition text-base md:text-sm"></textarea>
                </div>

                <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold uppercase tracking-wider py-4 rounded-lg shadow-md shadow-cyan-500/5 transition duration-200 mt-4 cursor-pointer text-center block text-sm">
                    Submit Project Ticket
                </button>
            </form>
        </div>
    </section>

    <footer class="bg-slate-950 text-slate-600 py-10 text-center text-xs px-6 w-full border-t border-slate-900">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <p class="mono-font">&copy; 2026 blaq.dev. All assets hand-compiled.</p>
            <p class="text-slate-500">Distributed architecture hosted serverless over Netlify global nodes.</p>
        </div>
    </footer>

</body>
</html>
